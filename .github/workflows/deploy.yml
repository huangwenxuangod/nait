name: Build Signed APK & Auto Sync to Tencent Cloud

on:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > nailit.keystore
            echo "Keystore successfully decoded from GitHub Secrets."
          else
            echo "No keystore secret found, using local fallback or generating a temporary one for build validation..."
            if [ -f "nailit.keystore" ]; then
              echo "Using committed or existing keystore."
            else
              echo "Generating fresh self-signed keystore..."
              keytool -genkeypair -v -keystore nailit.keystore -alias nailit -keyalg RSA -keysize 2048 -validity 10000 -storepass nailit123 -keypass nailit123 -dname "CN=NailIt, OU=Dev, O=NailIt, L=Beijing, S=Beijing, C=CN"
            fi
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          NAILIT_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NAILIT_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nailit-signed-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  deploy-tencent-cloud:
    name: Auto Sync & Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy on Tencent Cloud Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "129.204.200.38"
          username: "root"
          password: ${{ secrets.TENCENT_SERVER_PASSWORD }}
          port: 22
          script: |
            echo "连接腾讯云服务器成功，准备开始全自动同步部署..."
            cd /nait
            git config --global http.version HTTP/1.1
            git reset --hard origin/main
            git pull
            chmod +x deploy_server.sh
            ./deploy_server.sh
